<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard - Voluntário</title>

    <!-- Links css -->
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/ongDashboard.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="dashboard-ongs">

    <!-- Menu Lateral -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>Adote Lar</h1>
            <p>Portal de ONGS</p>
        </div>

        <nav class="sidebar-nav">
            <a class="nav-link active" href="#">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-link" href="#">
                <i class="fa fa-paw"></i>
                <span>Registro de animais</span>
            </a>
            <a class="nav-link" href="#">
                <i class="bi bi-person-plus"></i>
                <span>Solicitações de volutários</span>
            </a>
            <a class="nav-link" href="#">
                <i class="bi bi-gear"></i>
                <span>Configurações</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-new-animal" type="button">
                <i class="bi bi-plus-lg"></i>
                Registrar novo animal
            </button>

            <div class="sidebar-logout">
                <a class="nav-link logout" href="#">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Sair</span>
                </a>
            </div>
        </div>
    </aside>

    <!-- Nav -->
    <main class="dashboard-main">
        <header class="topbar">
            <nav class="topbar-nav">
                <a href="#" class="active">Dashboard</a>
                <a href="#">Relatórios</a>
            </nav>

            <div class="topbar-actions">

                <div class="user-section">
                    <button class="btn-notification" type="button" aria-label="Notificações">
                        <i class="bi bi-bell"></i>
                        <span class="notification-dot"></span>
                    </button>

                    <div class="user-info">
                        <p>Ong Vida Animal</p>
                    </div>

                    <img class="user-avatar"
                        src="https://static.vecteezy.com/system/resources/previews/008/249/343/non_2x/veterinary-logo-cat-and-dog-logo-design-pet-care-vet-clinic-logo-pet-clinic-vector.jpg"
                        alt="Foto de perfil do voluntário" />
                </div>
            </div>
        </header>

        <!-- Dashboard  -->
        <div class="dashboard-content">
            <section class="welcome-section">
                <h2>Olá, ONG Vida Animal 👋</h2>
                <p>Gerencie seus animais e acompanhe as solicitações recebidas.</p>
            </section>
        </div>
    </main>

</body>

</html>
